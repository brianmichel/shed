root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/shed ./cmd/shed"
bin = "./tmp/air/shed dev"
full_bin = "./tmp/air/shed dev"
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "2s"
include_ext = ["go", "html", "css", "js"]
exclude_dir = [".git", ".shed-dev", "bin", "tmp"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = true
follow_symlink = false
log = "air-build.log"
poll = false
poll_interval = 500
rerun = false
rerun_delay = 500

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[log]
time = true
main_only = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true
