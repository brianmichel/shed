<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shed</title>
  <link rel="stylesheet" href="/ui/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#/sandboxes">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Shed</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="#/sandboxes" data-route="sandboxes">Sandboxes</a>
        <a href="#/run" data-route="run">Run</a>
        <a href="#/events" data-route="events">Events</a>
      </nav>
      <div class="topmeta">
        <span class="kv"><span class="k">api</span><span class="v mono">/v1</span></span>
        <span class="kv health" id="health">
          <span class="dot" aria-hidden="true"></span>
          <span class="v" id="health-text">connecting</span>
        </span>
      </div>
    </div>
  </header>

  <section class="subbar">
    <div class="subbar-inner">
      <div class="crumbs" id="crumbs">
        <span class="crumb">sandboxes</span>
      </div>
      <div class="stats" id="stats">
        <span class="stat"><span class="stat-k">total</span><span class="stat-v mono" id="stat-total">0</span></span>
        <span class="stat"><span class="stat-k">ready</span><span class="stat-v mono" id="stat-ready">0</span></span>
        <span class="stat"><span class="stat-k">pending</span><span class="stat-v mono" id="stat-pending">0</span></span>
        <span class="stat"><span class="stat-k">released</span><span class="stat-v mono" id="stat-released">0</span></span>
      </div>
    </div>
  </section>

  <main class="wrap">
    <section class="panel" id="panel-sandboxes">
      <header class="panel-head">
        <h2>Sandboxes</h2>
        <div class="actions">
          <button class="btn ghost" id="refresh">Refresh</button>
          <button class="btn primary" id="create">+ New sandbox</button>
        </div>
      </header>
      <div class="tbl-wrap">
        <table class="tbl" id="sandbox-tbl">
          <thead>
            <tr>
              <th class="col-id">ID</th>
              <th>State</th>
              <th>Environment</th>
              <th>Template</th>
              <th>Capabilities</th>
              <th>Lease</th>
              <th class="col-age">Age</th>
              <th class="col-act"></th>
            </tr>
          </thead>
          <tbody id="sandboxes">
            <tr class="empty"><td colspan="8">Loading sandboxes…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="panel" id="panel-run">
      <header class="panel-head">
        <h2>Run command</h2>
        <div class="sel" id="sel-summary">no sandbox selected</div>
      </header>
      <div class="runbar">
        <label class="field">
          <span class="label">Sandbox</span>
          <input id="sandbox-id" class="mono" placeholder="sbx_…" autocomplete="off" />
        </label>
        <label class="field grow">
          <span class="label">Command</span>
          <input id="command" class="mono" value="echo hello from shed" autocomplete="off" />
        </label>
        <button class="btn primary" id="run">Execute</button>
      </div>
      <div class="terminal" id="term">
        <div class="term-head">
          <span class="t-dot t-r"></span><span class="t-dot t-y"></span><span class="t-dot t-g"></span>
          <span class="term-title mono" id="term-title">no command</span>
          <span class="term-status mono" id="term-status">idle</span>
        </div>
        <pre id="output" class="term-body">Select a sandbox and run a command. Events stream here.</pre>
      </div>
    </section>
  </main>

  <script src="/ui/app.js"></script>
</body>
</html>
